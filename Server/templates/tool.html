<!DOCTYPE html>
<html>
<head>
    <title>工具列表</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
    <script>
        function fetchTools() {
            fetch('/api/tool/list')
                .then(response => response.json())
                .then(data => {
                    const toolList = document.getElementById('tool-list');
                    toolList.innerHTML = ''; // Clear existing list
                    if (data) {
                        data.forEach(tool => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${tool.Name}</td>
                                <td><button onclick="runTool('${tool.Id}')">运行</button></td>
                            `;
                            toolList.appendChild(row);
                        });
                    }
                })
                .catch(error => console.error('Error fetching tools:', error));
        }

        function runTool(toolId) {
            window.location.href = `/tool/run?id=${toolId}`;
        }

        window.onload = fetchTools;
    </script>
</head>
<body>
    <h1>工具列表</h1>
    <table>
        <thead>
            <tr>
                <th>工具名称</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tool-list">
            <!-- Tools will be populated here by JavaScript -->
        </tbody>
    </table>
</body>
</html>
