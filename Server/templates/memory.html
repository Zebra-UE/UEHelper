<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统 HUD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0f14;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Consolas', monospace;
            min-height: 100vh;
            padding: 24px;
        }

        /* ──── 顶栏 ──── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .topbar h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #58d4ff;
        }
        .conn-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #777;
        }
        .conn-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #444;
            transition: background 0.4s;
        }
        .conn-dot.live  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
        .conn-dot.error { background: #ef4444; }

        /* ──── 主网格 ──── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .card {
            background: #141720;
            border: 1px solid #1e2433;
            border-radius: 12px;
            padding: 20px 24px;
        }

        .card-title {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 16px;
        }

        /* ──── 圆形进度表 ──── */
        .gauge-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .gauge {
            position: relative;
            width: 140px; height: 140px;
        }
        .gauge svg {
            transform: rotate(-90deg);
            width: 140px; height: 140px;
        }
        .gauge-bg {
            fill: none;
            stroke: #1e2433;
            stroke-width: 10;
        }
        .gauge-fill {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 345.4; /* 2π × 55 */
            stroke-dashoffset: 345.4;
            transition: stroke-dashoffset 0.6s ease, stroke 0.4s ease;
        }
        .gauge-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .gauge-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
        }
        .gauge-unit {
            font-size: 11px;
            color: #555;
            margin-top: 2px;
        }

        /* ──── 颜色状态 ──── */
        .color-ok     { color: #22c55e; }
        .color-warn   { color: #f59e0b; }
        .color-crit   { color: #ef4444; }

        .stroke-ok   { stroke: #22c55e; }
        .stroke-warn { stroke: #f59e0b; }
        .stroke-crit { stroke: #ef4444; }

        /* ──── 内存详情行 ──── */
        .mem-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }
        .mem-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .mem-label {
            font-size: 12px;
            color: #666;
            width: 40px;
            flex-shrink: 0;
        }
        .mem-bar-wrap {
            flex: 1;
            height: 6px;
            background: #1e2433;
            border-radius: 3px;
            overflow: hidden;
        }
        .mem-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .mem-val {
            font-size: 12px;
            text-align: right;
            width: 52px;
            flex-shrink: 0;
        }

        /* ──── 时间戳 ──── */
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>System HUD</h1>
    <div class="conn-badge">
        <div class="conn-dot" id="connDot"></div>
        <span id="connLabel">连接中...</span>
    </div>
</div>

<div class="grid">

    <!-- CPU 卡片 -->
    <div class="card">
        <div class="card-title">CPU 使用率</div>
        <div class="gauge-wrap">
            <div class="gauge">
                <svg viewBox="0 0 120 120">
                    <circle class="gauge-bg"  cx="60" cy="60" r="55"/>
                    <circle class="gauge-fill" id="cpuArc" cx="60" cy="60" r="55"/>
                </svg>
                <div class="gauge-center">
                    <span class="gauge-value" id="cpuVal">--</span>
                    <span class="gauge-unit">%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 内存 卡片 -->
    <div class="card">
        <div class="card-title">内存 (RAM)</div>
        <div class="gauge-wrap">
            <div class="gauge">
                <svg viewBox="0 0 120 120">
                    <circle class="gauge-bg" cx="60" cy="60" r="55"/>
                    <circle class="gauge-fill" id="memArc" cx="60" cy="60" r="55"/>
                </svg>
                <div class="gauge-center">
                    <span class="gauge-value" id="memPct">--</span>
                    <span class="gauge-unit">%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 内存详情 卡片 -->
    <div class="card">
        <div class="card-title">内存详情</div>
        <div class="mem-details">
            <div class="mem-row">
                <span class="mem-label">已用</span>
                <div class="mem-bar-wrap">
                    <div class="mem-bar" id="usedBar" style="width:0%; background:#ef4444;"></div>
                </div>
                <span class="mem-val color-crit" id="usedVal">-- GB</span>
            </div>
            <div class="mem-row">
                <span class="mem-label">可用</span>
                <div class="mem-bar-wrap">
                    <div class="mem-bar" id="freeBar" style="width:0%; background:#22c55e;"></div>
                </div>
                <span class="mem-val color-ok" id="freeVal">-- GB</span>
            </div>
            <div class="mem-row">
                <span class="mem-label">总计</span>
                <div class="mem-bar-wrap">
                    <div class="mem-bar" style="width:100%; background:#2a3245;"></div>
                </div>
                <span class="mem-val" style="color:#888" id="totalVal">-- GB</span>
            </div>
        </div>
    </div>

</div>

<div class="footer" id="tsLabel">--</div>

<script>
    const CIRCUMFERENCE = 2 * Math.PI * 55; // ≈ 345.4

    function pctToOffset(pct) {
        return CIRCUMFERENCE * (1 - Math.min(Math.max(pct, 0), 100) / 100);
    }

    function getColor(pct) {
        if (pct < 60) return { stroke: '#22c55e', text: 'color-ok' };
        if (pct < 85) return { stroke: '#f59e0b', text: 'color-warn' };
        return { stroke: '#ef4444', text: 'color-crit' };
    }

    function updateGauge(arcId, valId, pct) {
        const arc = document.getElementById(arcId);
        const val = document.getElementById(valId);
        const c   = getColor(pct);
        arc.style.strokeDashoffset = pctToOffset(pct);
        arc.style.stroke = c.stroke;
        val.textContent = pct.toFixed(1);
        val.className = 'gauge-value ' + c.text;
    }

    function render(data) {
        updateGauge('cpuArc', 'cpuVal', data.cpuPct);
        updateGauge('memArc', 'memPct', data.usedPct);

        const total = data.totalGB;
        document.getElementById('usedVal').textContent  = data.usedGB.toFixed(2) + ' GB';
        document.getElementById('freeVal').textContent  = data.freeGB.toFixed(2) + ' GB';
        document.getElementById('totalVal').textContent = total.toFixed(2) + ' GB';

        if (total > 0) {
            document.getElementById('usedBar').style.width = (data.usedGB / total * 100).toFixed(1) + '%';
            document.getElementById('freeBar').style.width = (data.freeGB / total * 100).toFixed(1) + '%';
        }

        const ts = new Date(data.timestamp);
        document.getElementById('tsLabel').textContent = '更新于 ' + ts.toLocaleTimeString();
    }

    // ──── WebSocket 连接管理 ────
    const dot   = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    let ws, retryTimer;

    function setConnState(state) {
        dot.className   = 'conn-dot ' + (state === 'live' ? 'live' : state === 'error' ? 'error' : '');
        label.textContent = state === 'live' ? '已连接' : state === 'error' ? '连接失败，重连中...' : '连接中...';
    }

    function connect() {
        clearTimeout(retryTimer);
        setConnState('connecting');

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws/memory`);

        ws.onopen  = () => setConnState('live');

        ws.onmessage = (e) => {
            try { render(JSON.parse(e.data)); } catch (_) {}
        };

        ws.onclose = ws.onerror = () => {
            setConnState('error');
            retryTimer = setTimeout(connect, 3000);
        };
    }

    connect();
</script>
</body>
</html>
