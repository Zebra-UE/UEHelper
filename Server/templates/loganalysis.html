<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志分析</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>日志分析列表</h1>
    <table>
        <thead>
            <tr>
                <th>序号</th>
                <th>文件名</th>
                <th>备注</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {{ range .items }}
            <tr id="row-{{ .Index }}">
                <td>{{ .Index }}</td>
                <td>{{ .Name }}</td>
                <td class="remark">{{ .Remark }}</td>
                <td>
                    <button onclick="analyzeLog('{{ .Name }}', '{{ .Index }}')">分析</button>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>

    <script>
        function analyzeLog(name, index) {
            fetch('/api/loganalysis/run', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ name: name }),
            })
            .then(response => response.json())
            .then(data => {
                const row = document.getElementById('row-' + index);
                if (row) {
                    const remarkCell = row.querySelector('.remark');
                    if (remarkCell && data.remark) {
                        remarkCell.textContent = data.remark;
                    }
                } else { 
                    console.error("Row not found for index: " + index);
                }
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
